name: Google Ads Marketing Agent

on:
  schedule:
    # Daily data collection: 6 AM AEST = 8 PM UTC (previous day)
    - cron: '0 20 * * *'
    # Weekly optimization: Monday 6 AM AEST = Sunday 8 PM UTC
    - cron: '0 20 * * 0'
  workflow_dispatch: # Manual trigger button

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine mode (daily vs weekly)
        id: mode
        run: |
          # Check if today is Monday (1 = Monday in date +%u)
          if [ "$(date +%u)" = "1" ]; then
            echo "mode=optimize" >> $GITHUB_OUTPUT
            echo "Running FULL OPTIMIZATION (Monday)"
          else
            echo "mode=collect" >> $GITHUB_OUTPUT
            echo "Running DATA COLLECTION (non-Monday)"
          fi

      - name: Run data collection
        if: steps.mode.outputs.mode == 'collect'
        run: npm run agents:google-ads:collect-data
        env:
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run full optimization
        if: steps.mode.outputs.mode == 'optimize'
        run: npm run agents:google-ads
        env:
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Google Ads Agent failed!"
          echo "Check the logs in GitHub Actions"
          # TODO: Add email/Slack notification here
